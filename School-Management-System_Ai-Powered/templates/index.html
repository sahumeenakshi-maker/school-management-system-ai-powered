{% extends "layout.html" %}

{% block title %}Login / Signup{% endblock %}

{% block content %}

<!-- Login/Signup Modal (This is a modal pop-up on the landing page) -->
<div id="login-signup-modal" class="auth-modal" style="display: flex; position: static; max-width: 400px; padding: 40px;">
    
    <!-- Login Form Container -->
    <div id="login-form-container" style="display: block;">
        <h2 style="margin-top: 0;">Login</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" name="email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required>
            </div>
            <a href="{{ url_for('forgot_password') }}" class="link-button" style="display: block; text-align: right; margin-bottom: 15px;">Forgot password?</a>
            <button type="submit" class="submit-button">Login Now</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">Don't have an account? 
            <button type="button" class="link-button switch-auth" data-target="signup">Signup</button>
        </p>
    </div>

    <!-- Signup Form Container (Initially Hidden) -->
    <div id="signup-form-container" style="display: none;">
        <h2 style="margin-top: 0;">Signup</h2>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" name="name" required>
            </div>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required>
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required>
            </div>
            <div class="form-group">
                <label for="signup-role">Register As</label>
                <select id="signup-role" name="role" required>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="submit-button">Create Account</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">Already have an account? 
            <button type="button" class="link-button switch-auth" data-target="login">Login</button>
        </p>
    </div>
</div>

{% endblock %}
